<html>
<head>
	<meta charset="UTF=8">
	<meta name="viewport" content="width=device-width, inital-scale=1.0">
	<title>Tilemap Rotator</title>
	<link rel = "stylesheet" href = "style.css">
</head>

<body>
	<div id = "bigContainer">
		<h1>Welcome to the the sprite rotator!</h1>
		<p>Attach your images to begin</p>
		<p>When you're ready, press "Clean JSON file!" to download!</p>
		
		
		<div class="imgUploader"><p>Base Image</p><input id = "centerSrc" input type="file" accept=".png" /></div>
		<div class="imgUploader"><p>Corner Image</p><input id = "cornerSrc" input type="file" accept=".png"  /></div>
		<div class="imgUploader"><p>Edge Image</p><input id = "edgeSrc"input type="file" accept=".png" /></div>
		
		
		<button id="startButton" onclick="StartCleaning()">Rotate them sprites!!</button>
		
		<canvas id="canvas"></canvas>
		<img id="testPreview"></img>
		<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

		
		<script src="tileRotator.js"></script>
	</div>
	
	
</body>


</html>
